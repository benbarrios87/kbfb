<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kjøkkenboka | KBFB Personal</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="layout">
    <aside class="sidebar nature-sidebar">
      <div class="brand">
        <div class="brand-icon">🌲</div>
        <h2>KBFB</h2>
        <p>Personalrommet</p>
      </div>

      <nav>
        <a href="dashboard.html">🏠 Hjem</a>
        <a href="vakter.html">📅 Vakter</a>
        <a class="active" href="kjokkenboka.html">📖 Kjøkkenboka</a>
        <a href="vikarer.html">🕒 Vikarer</a>
        <a href="ferieogavspasering.html">🌴 Ferie og avspasering</a>
        <a href="filarkiv.html">📁 Filarkiv</a>
        <a href="aarshjul.html">🗓️ Årshjul</a>
        <a href="turbank.html">🏕️ Turbank</a>
        <a href="admin.html">⚙️ Admin</a>
      </nav>
    </aside>

    <main class="main">
      <section class="forest-hero compact">
        <div>
          <p class="eyebrow">Felles beskjedbok</p>
          <h1>Kjøkkenboka</h1>
          <p class="muted">Skriv raskt. Les raskt. Akkurat som boka på kjøkkenet.</p>
        </div>
        <div class="hero-badge">✏️ Enkel beskjedlogg</div>
      </section>

      <section class="card kitchen-simple">
        <h2>Ny beskjed</h2>

        <form id="quickNoteForm" class="quick-note-form">
          <div class="quick-row">
            <label>
              Hvem?
              <select id="quickNoteAuthor" required>
                <option value="">Velg navn</option>
                <option value="Benjamin">Benjamin</option>
                <option value="Imelda">Imelda</option>
                <option value="Nika">Nika</option>
                <option value="Irina">Irina</option>
                <option value="Mari">Mari</option>
                <option value="Marianne R">Marianne R</option>
                <option value="Marianne L">Marianne L</option>
                <option value="Valantis">Valantis</option>
                <option value="Britt">Britt</option>
                <option value="Lola">Lola</option>
              </select>
            </label>

            <label>
              Dato
              <input id="quickNoteDate" type="date" required />
            </label>
          </div>

          <label>
            Beskjed
            <textarea id="quickNoteText" rows="3" placeholder="Skriv beskjed her..." required></textarea>
          </label>

          <div class="quick-buttons">
            <button type="button" class="quick-template" data-text="Tannlege kl. ">Tannlege</button>
            <button type="button" class="quick-template" data-text="Møte kl. ">Møte</button>
            <button type="button" class="quick-template" data-text="Kontordag ">Kontordag</button>
            <button type="button" class="quick-template" data-text="Går kl. ">Går tidlig</button>
            <button type="button" class="quick-template" data-text="Vikar: ">Vikar</button>
          </div>

          <button class="primary-btn form-button" type="submit">Lagre beskjed</button>
        </form>
      </section>

      <section class="card">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Oversikt</p>
            <h2>Beskjeder</h2>
          </div>
          <button id="clearQuickNotes" class="secondary-btn">Tøm testdata</button>
        </div>

        <div id="quickNoteFeed" class="kitchen-feed">
          <p class="muted">Ingen beskjeder ennå.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
