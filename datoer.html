<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datoer | KBFB Personal</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="layout">
    <aside class="sidebar nature-sidebar">
      <div class="brand">
        <div class="brand-icon">🌲</div>
        <h2>KBFB</h2>
        <p>Personalrommet</p>
      </div>

      <nav>
        <a href="dashboard.html">🏠 Hjem</a>
        <a href="vakter.html">📅 Vakter</a>
        <a href="kjokkenboka.html">📖 Kjøkkenboka</a>
        <a class="active" href="datoer.html">📆 Datoer</a>
        <a href="kalender.html">📍 Hvor er Benjamin?</a>
        <a href="vikarer.html">🕒 Vikarer</a>
        <a href="ferieogavspasering.html">🌴 Ferie og avspasering</a>
        <a href="filarkiv.html">📁 Filarkiv</a>
        <a href="aarshjul.html">🗓️ Årshjul</a>
        <a href="turbank.html">🏕️ Turbank</a>
        <a href="admin.html">⚙️ Admin</a>
      </nav>
    </aside>

    <main class="main">
      <section class="forest-hero compact">
        <div>
          <p class="eyebrow">Årshjul</p>
          <h1>Datoer</h1>
          <p class="muted">Viktige datoer måned for måned.</p>
        </div>
        <div class="hero-badge">📆 Felles kalender</div>
      </section>

      <section class="card">
        <h2>Legg til / endre dato</h2>

        <form id="dateForm" class="form-grid">
          <input type="hidden" id="dateId" />

          <label>
            Dato
            <input type="date" id="eventDate" required />
          </label>

          <label>
            Type
            <select id="eventCategory" required>
              <option value="general">Generelt</option>
              <option value="personal">Personalmøte</option>
              <option value="plandager">Plandag</option>
              <option value="overnatting">Overnatting / tur</option>
              <option value="foreldre">Foreldre</option>
              <option value="styre">Styremøte</option>
              <option value="su">SU-møte</option>
            </select>
          </label>

          <label class="wide-field">
            Tittel
            <input type="text" id="eventTitle" placeholder="Fylles automatisk, men kan endres" required />
          </label>

          <label class="wide-field">
            Notat
            <input type="text" id="eventNote" placeholder="Valgfritt, f.eks. kl. 18.00 eller barnehagen stengt" />
          </label>

          <button class="primary-btn form-button" type="submit">Lagre dato</button>
        </form>
      </section>

      <section class="card">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Oversikt</p>
            <h2>Årshjul</h2>
          </div>

          <label class="compact-filter">
            Vis
            <select id="dateCategoryFilter">
              <option value="all">Alle</option>
              <option value="general">Generelt</option>
              <option value="personal">Personalmøte</option>
              <option value="plandager">Plandag</option>
              <option value="overnatting">Overnatting / tur</option>
              <option value="foreldre">Foreldre</option>
              <option value="styre">Styremøte</option>
              <option value="su">SU-møte</option>
            </select>
          </label>
        </div>

        <div id="dateList" class="date-list month-list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
